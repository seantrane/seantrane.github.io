---
# Configuration file for MegaLinter
# See all available variables at https://megalinter.io/configuration/ and in linters documentation

# Activates formatting and auto-fixing
APPLY_FIXES: none
# https://megalinter.io/latest/supported-linters/
# If you use ENABLE variable, all other languages/formats/tooling formats will be disabled by default
ENABLE:
  - BASH
  # - CLOUDFORMATION
  - CSS
  - DOCKERFILE
  - EDITORCONFIG
  - ENV
  # - GHERKIN
  - HTML
  - JAVASCRIPT
  - JSON
  # - KUBERNETES
  - MARKDOWN
  # - OPENAPI
  # - PYTHON
  - REPOSITORY
  - RUBY
  # - TERRAFORM
  # - XML
  - YAML
DISABLE_LINTERS:
  - JAVASCRIPT_STANDARD
  - JSON_PRETTIER
  - KUBERNETES_KUBEVAL
  - MARKDOWN_MARKDOWN_LINK_CHECK
  - MARKDOWN_REMARK_LINT
  # - PYTHON_BLACK
  - PYTHON_FLAKE8
  - PYTHON_ISORT
  - PYTHON_MYPY
  - PYTHON_PYRIGHT
  - PYTHON_RUFF
  # - REPOSITORY_CHECKOV
  - REPOSITORY_DEVSKIM
  - REPOSITORY_DUSTILOCK
  - REPOSITORY_GOODCHECK
  - REPOSITORY_GRYPE
  - REPOSITORY_KICS
  - REPOSITORY_KINGFISHER
  - REPOSITORY_SEMGREP
  - REPOSITORY_SYFT
  - REPOSITORY_TRUFFLEHOG
  - TERRAFORM_TERRASCAN
BASH_EXEC_FILE_EXTENSIONS: ['']
BASH_EXEC_FILTER_REGEX_INCLUDE: '(bin/*|functions/*|scripts/*)'
BASH_SHELLCHECK_FILE_EXTENSIONS: ['', '.sh', '.bash', '.dash', '.ksh']
BASH_SHELLCHECK_FILTER_REGEX_EXCLUDE: '.gitkeep'
BASH_SHELLCHECK_FILTER_REGEX_INCLUDE: '(bin/*|functions/*|scripts/*)'
BASH_SHFMT_FILE_EXTENSIONS: ['', '.sh', '.bash', '.dash', '.ksh']
BASH_SHFMT_FILTER_REGEX_EXCLUDE: '(.gitkeep)'
BASH_SHFMT_FILTER_REGEX_INCLUDE: '(bin/*|functions/*|scripts/*)'
CSS_FILTER_REGEX_EXCLUDE: '(src/assets/css/main.scss|src/_sass/components/old/)'
CSS_STYLELINT_CONFIG_FILE: 'stylelint.config.js'
EXCLUDED_DIRECTORIES: ['.git', '.terraform', 'megalinter-reports', 'node_modules', 'vendor']
FILTER_REGEX_EXCLUDE: (test/|megalinter-reports/|node_modules/|vendor/)
FLAVOR_SUGGESTIONS: false
FORMATTERS_DISABLE_ERRORS: false
JSON_JSONLINT_FILTER_REGEX_EXCLUDE: '(.devcontainer/|.vscode/|tests/|node_modules/|vendor/|src/feed.json)'
MARKDOWN_MARKDOWN_LINK_CHECK_DISABLE_ERRORS: true
MARKDOWN_MARKDOWNLINT_FILTER_REGEX_EXCLUDE: '(CHANGELOG.md)'
PRINT_ALL_FILES: false
PRINT_ALPACA: false
PYTHON_PYLINT_CONFIG_FILE: pyproject.toml
PYTHON_PYLINT_ARGUMENTS: '--fail-under=0 --fail-on=E'
PYTHON_BANDIT_CONFIG_FILE: pyproject.toml
PYTHON_BANDIT_PRE_COMMANDS:
  - command: 'pip install bandit[toml]'
    cwd: 'workspace'
REPORTERS_MARKDOWN_TYPE: simple
REPOSITORY_CHECKOV_ARGUMENTS:
  - '--check'
  - 'HIGH'
  - '--skip-check'
  - 'MEDIUM'
  - '--skip-path'
  - '.devcontainer'
  - '--skip-path'
  - '.terraform'
  - '--skip-path'
  - 'megalinter-reports'
  - '--skip-path'
  - 'node_modules'
  - '--skip-path'
  - 'vendor'
REPOSITORY_KICS_ARGUMENTS: '--exclude-severities info,low'
REPOSITORY_TRIVY_ARGUMENTS:
  - '--db-repository'
  - 'ghcr.io/aquasecurity/trivy-db:2'
  - '--java-db-repository'
  - 'ghcr.io/aquasecurity/trivy-java-db:1'
  - '--skip-dirs'
  - '.devcontainer'
  - '--skip-dirs'
  - '.terraform'
  - '--skip-dirs'
  - 'megalinter-reports'
  - '--skip-dirs'
  - 'node_modules'
  - '--skip-dirs'
  - 'vendor'
SHOW_ELAPSED_TIME: true
SHOW_SKIPPED_LINTERS: false
YAML_PRETTIER_FILTER_REGEX_EXCLUDE: '(\.github/workflows/|src/_includes/data/api\.yml)'
YAML_V8R_FILTER_REGEX_EXCLUDE: '(_config\.yml)'
YAML_YAMLLINT_FILTER_REGEX_EXCLUDE: '(\.github/workflows/)'
